name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deployment
        run: |
          response=$(curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "https://app.coolify.io/api/v1/deploy?uuid=f4w08gk4k8s0gko0ogcsw8kw&force=false")
          echo "$response"
          echo "$response" | grep -q "deployment queued" || exit 1
