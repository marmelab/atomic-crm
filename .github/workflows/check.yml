name: "✅ Check"
on:
    push:
        branches:
            - main
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
            - ready_for_review

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    lint:
        name: "\U0001F52C ESLint"
        runs-on: ubuntu-latest
        timeout-minutes: 10
        if: ${{ !github.event.pull_request.draft || github.event_name == 'push' }}
        permissions:
            contents: write
            checks: write
        steps:
            - name: "\U0001F4E5 Checkout repo"
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: "⚙️ Setup node"
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 20
                  cache: npm

            - name: "\U0001F4E5 Download deps"
              run: npm ci

            - name: "\U0001F52C Lint"
              uses: wearerequired/lint-action@548d8a7c4b04d3553d32ed5b6e91eb171e10e7bb # v2
              with:
                  eslint: true
                  eslint_args: "**/*.{mjs,ts,tsx}"
                  prettier: true
                  prettier_args: "--config ./.prettierrc.json \"**/*.{js,json,ts,tsx,css,md,html}\""

    test:
        name: "\U0001F50E Test"
        runs-on: ubuntu-latest
        timeout-minutes: 10
        if: ${{ !github.event.pull_request.draft || github.event_name == 'push' }}
        steps:
            - name: "\U0001F4E5 Checkout repo"
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: "⚙️ Setup node"
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 20
                  cache: npm

            - name: "\U0001F4E5 Download deps"
              run: npm ci

            - name: "\U0001F3AD Install Playwright browsers"
              run: npx playwright install chromium chromium-headless-shell

            - name: "\U0001F50E Unit Tests"
              run: CI=1 npm test -- --run

            - name: "\U0001F50E Integration Tests"
              run: CI=1 npm run test:integration -- --run


    build:
        name: "\U0001F528 Build"
        timeout-minutes: 10
        runs-on: ubuntu-latest
        if: ${{ !github.event.pull_request.draft || github.event_name == 'push' }}
        steps:
            - name: "\U0001F4E5 Checkout repo"
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: "⚙️ Setup node"
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 20
                  cache: npm

            - name: "\U0001F4E5 Download deps"
              run: npm ci

            - name: "\U0001F528 Build"
              run: npm run build
