<!doctype html>
<html lang="en" translate="no" class="notranslate">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="minimum-scale=1, initial-scale=1, width=device-width, shrink-to-fit=no"
    />
    <title>Atomic CRM</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <script>
      const authorizationId = new URLSearchParams(
        window.location.search,
      ).get("authorization_id");

      const target = authorizationId
        ? `${window.location.origin}/#/oauth/consent?authorization_id=${encodeURIComponent(authorizationId)}`
        : `${window.location.origin}/#/`;

      // replace() so back button doesn't return to this redirect stub
      window.location.replace(target);
    </script>
  </body>
</html>
