<!doctype html>
<html lang="en" translate="no" class="notranslate">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="minimum-scale=1, initial-scale=1, width=device-width, shrink-to-fit=no"
    />
    <title>Atomic CRM — Authorizing…</title>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var authorizationId = params.get("authorization_id");
        var target = authorizationId
          ? window.location.origin +
            "/#/oauth/consent?authorization_id=" +
            encodeURIComponent(authorizationId)
          : window.location.origin + "/#/";
        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    <p style="font-family: sans-serif; padding: 2rem; text-align: center">
      Redirecting to authorization…
      <br />
      <a id="manual-link" href="/">Click here if you are not redirected.</a>
    </p>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var authorizationId = params.get("authorization_id");
        if (!authorizationId) return;
        var target =
          window.location.origin +
          "/#/oauth/consent?authorization_id=" +
          encodeURIComponent(authorizationId);
        document.getElementById("manual-link").href = target;
      })();
    </script>
  </body>
</html>
