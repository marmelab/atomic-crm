<!doctype html>
<html lang="en" translate="no" class="notranslate">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="minimum-scale=1, initial-scale=1, width=device-width, shrink-to-fit=no"
        />
        <meta name="theme-color" content="#000000" />
        <meta name="google" content="notranslate" />
        <link rel="manifest" href="./manifest.json" />
        <link rel="shortcut icon" href="./favicon.ico" />
        <title>Atomic CRM</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: system-ui, -apple-system, sans-serif;
                background: #fafafa;
                color: #1a1a1a;
                line-height: 1.5;
            }

            .loader-container {
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                position: absolute;
                top: 0;
                bottom: 0;
                left: 0;
                right: 0;
                background-color: #fafafa;
            }

            main {
                max-width: 32rem;
                margin: 0 auto;
                padding: 2rem 1.25rem;
            }

            h1 {
                font-size: 1.25rem;
                margin: 0 0 0.5rem;
            }

            p {
                margin: 0 0 1rem;
                color: #444;
            }

            .card {
                background: #fff;
                border: 1px solid #e5e5e5;
                border-radius: 8px;
                padding: 1.25rem;
                margin-top: 1rem;
            }

            .status-ok {
                color: #166534;
            }

            .status-error {
                color: #b91c1c;
            }

            a.button {
                display: inline-block;
                background: #283593;
                color: #fff;
                border-radius: 6px;
                padding: 0.625rem 1rem;
                font-size: 0.9375rem;
                text-decoration: none;
            }

            code {
                font-size: 0.8125rem;
                word-break: break-all;
            }

            .loader,
            .loader:before,
            .loader:after {
                border-radius: 50%;
            }

            .loader {
                color: #283593;
                font-size: 11px;
                text-indent: -99999em;
                margin: 55px auto;
                position: relative;
                width: 10em;
                height: 10em;
                box-shadow: inset 0 0 0 1em;
                transform: translateZ(0);
            }

            .loader:before,
            .loader:after {
                position: absolute;
                content: "";
            }

            .loader:before {
                width: 5.2em;
                height: 10.2em;
                background: #fafafa;
                border-radius: 10.2em 0 0 10.2em;
                top: -0.1em;
                left: -0.1em;
                transform-origin: 5.2em 5.1em;
                animation: load2 2s infinite ease 1.5s;
            }

            .loader:after {
                width: 5.2em;
                height: 10.2em;
                background: #fafafa;
                border-radius: 0 10.2em 10.2em 0;
                top: -0.1em;
                left: 5.1em;
                transform-origin: 0 5.1em;
                animation: load2 2s infinite ease;
            }

            @keyframes load2 {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>

    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>

        <div id="agent-setup" hidden>
            <main>
                <h1>MCP agent setup</h1>
                <p>Finishing connection for ElevenLabs and similar tools.</p>
                <div id="agent-content" class="card">Saving agent credentials…</div>
            </main>
        </div>

        <div id="login-callback">
            <div class="loader-container">
                <div class="loader">Loading...</div>
            </div>
        </div>

        <script>
            (function () {
                var PKCE_KEY = "mcp_agent_code_verifier";
                var redirectUri =
                    window.location.origin + "/auth-callback.html";

                function findAuthStorageKey() {
                    for (var i = 0; i < localStorage.length; i++) {
                        var key = localStorage.key(i);
                        if (
                            key &&
                            key.indexOf("sb-") === 0 &&
                            key.endsWith("-auth-token")
                        ) {
                            return key;
                        }
                    }
                    return null;
                }

                function getSession() {
                    var key = findAuthStorageKey();
                    if (!key) return null;
                    try {
                        var raw = localStorage.getItem(key);
                        if (!raw) return null;
                        var data = JSON.parse(raw);
                        var match = key.match(/^sb-(.+)-auth-token$/);
                        var projectRef = match ? match[1] : null;
                        if (!projectRef || !data.access_token) return null;
                        return {
                            accessToken: data.access_token,
                            supabaseUrl:
                                "https://" + projectRef + ".supabase.co",
                        };
                    } catch (e) {
                        return null;
                    }
                }

                function setAgentContent(html) {
                    document.getElementById("agent-content").innerHTML = html;
                }

                function showAgentSetup() {
                    document.getElementById("agent-setup").hidden = false;
                    document.getElementById("login-callback").hidden = true;
                }

                function showAgentError(message, details) {
                    var html =
                        '<p class="status-error"><strong>Error:</strong> ' +
                        message +
                        "</p>";
                    if (details) {
                        html += "<p><code>" + details + "</code></p>";
                    }
                    html +=
                        '<p><a class="button" href="./oauth-agent-setup.html">Try again</a></p>';
                    setAgentContent(html);
                }

                function finishAgentSetup(code) {
                    showAgentSetup();
                    var session = getSession();
                    if (!session) {
                        showAgentError(
                            "You must be logged in as a CRM administrator.",
                            "Sign in at the CRM, then run setup again from oauth-agent-setup.html",
                        );
                        return;
                    }

                    var verifier = sessionStorage.getItem(PKCE_KEY);
                    if (!verifier) {
                        showAgentError(
                            "Missing PKCE verifier.",
                            "Start again from oauth-agent-setup.html and click Connect in the same browser tab.",
                        );
                        return;
                    }

                    fetch(
                        session.supabaseUrl + "/functions/v1/mcp-agent-setup",
                        {
                            method: "POST",
                            headers: {
                                Authorization:
                                    "Bearer " + session.accessToken,
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({
                                code: code,
                                redirect_uri: redirectUri,
                                code_verifier: verifier,
                            }),
                        },
                    )
                        .then(function (res) {
                            return res.json().then(function (body) {
                                return {
                                    ok: res.ok,
                                    status: res.status,
                                    body: body,
                                };
                            });
                        })
                        .then(function (result) {
                            sessionStorage.removeItem(PKCE_KEY);
                            if (window.history.replaceState) {
                                window.history.replaceState(
                                    {},
                                    "",
                                    window.location.pathname,
                                );
                            }

                            if (!result.ok) {
                                var msg =
                                    result.body.message ||
                                    result.body.error ||
                                    "Setup request failed";
                                showAgentError(msg, JSON.stringify(result.body));
                                return;
                            }

                            setAgentContent(
                                '<p class="status-ok"><strong>Agent connected.</strong></p>' +
                                    "<p>Use your OAuth app <strong>client secret</strong> as the Secret Token in ElevenLabs.</p>" +
                                    '<p><a class="button" href="./">Back to CRM</a></p>',
                            );
                        })
                        .catch(function (err) {
                            showAgentError("Network error", String(err));
                        });
                }

                var search = new URLSearchParams(window.location.search);
                var code = search.get("code");
                var oauthError = search.get("error");
                var oauthErrorDescription = search.get("error_description");

                if (oauthError) {
                    showAgentSetup();
                    showAgentError(
                        oauthError,
                        oauthErrorDescription || "",
                    );
                    return;
                }

                if (code) {
                    finishAgentSetup(code);
                    return;
                }

                var hashParams = new URLSearchParams(
                    window.location.hash.substring(1),
                );
                var access_token = hashParams.get("access_token");
                var refresh_token = hashParams.get("refresh_token");
                var type = hashParams.get("type");

                if (access_token) {
                    window.location.href =
                        "./#/auth-callback?access_token=" +
                        encodeURIComponent(access_token) +
                        "&refresh_token=" +
                        encodeURIComponent(refresh_token || "") +
                        "&type=" +
                        encodeURIComponent(type || "");
                    return;
                }

                window.location.href = "./#/";
            })();
        </script>
    </body>
</html>
